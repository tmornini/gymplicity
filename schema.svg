<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#666" stroke-width="1.2"/>
    </marker>
    <marker id="one" markerWidth="1" markerHeight="12" refX="0" refY="6" orient="auto">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#666" stroke-width="1.5"/>
    </marker>
    <marker id="many" markerWidth="10" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M10,6 L0,0 M10,6 L0,12" fill="none" stroke="#666" stroke-width="1.2"/>
    </marker>
  </defs>

  <style>
    .entity-box { fill: #fff; stroke: #333; stroke-width: 1.5; rx: 6; }
    .entity-header { fill: #1a1a2e; rx: 6; }
    .entity-header-text { fill: #fff; font-weight: bold; font-size: 14px; }
    .pk { fill: #e8b100; }
    .pk-text { font-weight: bold; font-size: 11px; fill: #fff; }
    .fk { fill: #5b7db1; }
    .fk-text { font-weight: bold; font-size: 11px; fill: #fff; }
    .col-name { fill: #1a1a2e; }
    .col-type { fill: #888; font-size: 12px; }
    .rel-line { stroke: #666; stroke-width: 1.5; fill: none; }
    .rel-label { font-size: 11px; fill: #555; }
    .delete-rule { font-size: 10px; fill: #b44; font-style: italic; }
    .computed { fill: #999; font-style: italic; font-size: 12px; }
  </style>

  <!-- ==================== TRAINER ==================== -->
  <g transform="translate(20,20)">
    <rect class="entity-box" width="220" height="100"/>
    <rect class="entity-header" width="220" height="32"/>
    <text class="entity-header-text" x="110" y="22" text-anchor="middle">Trainer</text>
    <g transform="translate(0,44)">
      <rect class="pk" x="8" y="-2" width="22" height="16" rx="3"/>
      <text class="pk-text" x="19" y="10" text-anchor="middle">PK</text>
      <text class="col-name" x="38" y="11">id</text>
      <text class="col-type" x="200" y="11" text-anchor="end">UUID</text>
    </g>
    <g transform="translate(0,66)">
      <text class="col-name" x="38" y="11">name</text>
      <text class="col-type" x="200" y="11" text-anchor="end">String</text>
    </g>
  </g>

  <!-- ==================== EXERCISE DEFINITION ==================== -->
  <g transform="translate(350,20)">
    <rect class="entity-box" width="260" height="122"/>
    <rect class="entity-header" width="260" height="32"/>
    <text class="entity-header-text" x="130" y="22" text-anchor="middle">ExerciseDefinition</text>
    <g transform="translate(0,44)">
      <rect class="pk" x="8" y="-2" width="22" height="16" rx="3"/>
      <text class="pk-text" x="19" y="10" text-anchor="middle">PK</text>
      <text class="col-name" x="38" y="11">id</text>
      <text class="col-type" x="240" y="11" text-anchor="end">UUID</text>
    </g>
    <g transform="translate(0,66)">
      <text class="col-name" x="38" y="11">name</text>
      <text class="col-type" x="240" y="11" text-anchor="end">String</text>
    </g>
    <g transform="translate(0,88)">
      <rect class="fk" x="8" y="-2" width="22" height="16" rx="3"/>
      <text class="fk-text" x="19" y="10" text-anchor="middle">FK</text>
      <text class="col-name" x="38" y="11">trainer</text>
      <text class="col-type" x="240" y="11" text-anchor="end">Trainer?</text>
    </g>
  </g>

  <!-- ==================== TRAINEE ==================== -->
  <g transform="translate(20,200)">
    <rect class="entity-box" width="220" height="122"/>
    <rect class="entity-header" width="220" height="32"/>
    <text class="entity-header-text" x="110" y="22" text-anchor="middle">Trainee</text>
    <g transform="translate(0,44)">
      <rect class="pk" x="8" y="-2" width="22" height="16" rx="3"/>
      <text class="pk-text" x="19" y="10" text-anchor="middle">PK</text>
      <text class="col-name" x="38" y="11">id</text>
      <text class="col-type" x="200" y="11" text-anchor="end">UUID</text>
    </g>
    <g transform="translate(0,66)">
      <text class="col-name" x="38" y="11">name</text>
      <text class="col-type" x="200" y="11" text-anchor="end">String</text>
    </g>
    <g transform="translate(0,88)">
      <rect class="fk" x="8" y="-2" width="22" height="16" rx="3"/>
      <text class="fk-text" x="19" y="10" text-anchor="middle">FK</text>
      <text class="col-name" x="38" y="11">trainer</text>
      <text class="col-type" x="200" y="11" text-anchor="end">Trainer?</text>
    </g>
  </g>

  <!-- ==================== WORKOUT ==================== -->
  <g transform="translate(20,400)">
    <rect class="entity-box" width="220" height="166"/>
    <rect class="entity-header" width="220" height="32"/>
    <text class="entity-header-text" x="110" y="22" text-anchor="middle">Workout</text>
    <g transform="translate(0,44)">
      <rect class="pk" x="8" y="-2" width="22" height="16" rx="3"/>
      <text class="pk-text" x="19" y="10" text-anchor="middle">PK</text>
      <text class="col-name" x="38" y="11">id</text>
      <text class="col-type" x="200" y="11" text-anchor="end">UUID</text>
    </g>
    <g transform="translate(0,66)">
      <rect class="fk" x="8" y="-2" width="22" height="16" rx="3"/>
      <text class="fk-text" x="19" y="10" text-anchor="middle">FK</text>
      <text class="col-name" x="38" y="11">trainee</text>
      <text class="col-type" x="200" y="11" text-anchor="end">Trainee?</text>
    </g>
    <g transform="translate(0,88)">
      <text class="col-name" x="38" y="11">date</text>
      <text class="col-type" x="200" y="11" text-anchor="end">Date</text>
    </g>
    <g transform="translate(0,110)">
      <text class="col-name" x="38" y="11">notes</text>
      <text class="col-type" x="200" y="11" text-anchor="end">String?</text>
    </g>
    <g transform="translate(0,132)">
      <text class="col-name" x="38" y="11">isComplete</text>
      <text class="col-type" x="200" y="11" text-anchor="end">Bool</text>
    </g>
  </g>

  <!-- ==================== EXERCISE ==================== -->
  <g transform="translate(370,400)">
    <rect class="entity-box" width="220" height="144"/>
    <rect class="entity-header" width="220" height="32"/>
    <text class="entity-header-text" x="110" y="22" text-anchor="middle">Exercise</text>
    <g transform="translate(0,44)">
      <rect class="pk" x="8" y="-2" width="22" height="16" rx="3"/>
      <text class="pk-text" x="19" y="10" text-anchor="middle">PK</text>
      <text class="col-name" x="38" y="11">id</text>
      <text class="col-type" x="200" y="11" text-anchor="end">UUID</text>
    </g>
    <g transform="translate(0,66)">
      <rect class="fk" x="8" y="-2" width="22" height="16" rx="3"/>
      <text class="fk-text" x="19" y="10" text-anchor="middle">FK</text>
      <text class="col-name" x="38" y="11">workout</text>
      <text class="col-type" x="200" y="11" text-anchor="end">Workout?</text>
    </g>
    <g transform="translate(0,88)">
      <rect class="fk" x="8" y="-2" width="22" height="16" rx="3"/>
      <text class="fk-text" x="19" y="10" text-anchor="middle">FK</text>
      <text class="col-name" x="38" y="11">definition</text>
      <text class="col-type" x="200" y="11" text-anchor="end">ExerciseDefinition?</text>
    </g>
    <g transform="translate(0,110)">
      <text class="col-name" x="38" y="11">order</text>
      <text class="col-type" x="200" y="11" text-anchor="end">Int</text>
    </g>
  </g>

  <!-- ==================== WORKOUT SET ==================== -->
  <g transform="translate(720,400)">
    <rect class="entity-box" width="220" height="188"/>
    <rect class="entity-header" width="220" height="32"/>
    <text class="entity-header-text" x="110" y="22" text-anchor="middle">WorkoutSet</text>
    <g transform="translate(0,44)">
      <rect class="pk" x="8" y="-2" width="22" height="16" rx="3"/>
      <text class="pk-text" x="19" y="10" text-anchor="middle">PK</text>
      <text class="col-name" x="38" y="11">id</text>
      <text class="col-type" x="200" y="11" text-anchor="end">UUID</text>
    </g>
    <g transform="translate(0,66)">
      <rect class="fk" x="8" y="-2" width="22" height="16" rx="3"/>
      <text class="fk-text" x="19" y="10" text-anchor="middle">FK</text>
      <text class="col-name" x="38" y="11">exercise</text>
      <text class="col-type" x="200" y="11" text-anchor="end">Exercise?</text>
    </g>
    <g transform="translate(0,88)">
      <text class="col-name" x="38" y="11">order</text>
      <text class="col-type" x="200" y="11" text-anchor="end">Int</text>
    </g>
    <g transform="translate(0,110)">
      <text class="col-name" x="38" y="11">weight</text>
      <text class="col-type" x="200" y="11" text-anchor="end">Double</text>
    </g>
    <g transform="translate(0,132)">
      <text class="col-name" x="38" y="11">reps</text>
      <text class="col-type" x="200" y="11" text-anchor="end">Int</text>
    </g>
    <g transform="translate(0,154)">
      <text class="col-name" x="38" y="11">isCompleted</text>
      <text class="col-type" x="200" y="11" text-anchor="end">Bool</text>
    </g>
    <g transform="translate(0,176)">
      <text class="col-name" x="38" y="11">completedAt</text>
      <text class="col-type" x="200" y="11" text-anchor="end">Date?</text>
    </g>
  </g>

  <!-- ==================== RELATIONSHIPS ==================== -->

  <!-- Trainer 1──* ExerciseDefinition -->
  <line class="rel-line" x1="240" y1="70" x2="350" y2="70" marker-start="url(#one)" marker-end="url(#many)"/>
  <text class="rel-label" x="295" y="63" text-anchor="middle">1 : *</text>
  <text class="delete-rule" x="295" y="84" text-anchor="middle">cascade</text>

  <!-- Trainer 1──* Trainee -->
  <line class="rel-line" x1="130" y1="120" x2="130" y2="200" marker-start="url(#one)" marker-end="url(#many)"/>
  <text class="rel-label" x="145" y="163" text-anchor="start">1 : *</text>
  <text class="delete-rule" x="145" y="176" text-anchor="start">cascade</text>

  <!-- Trainee 1──* Workout -->
  <line class="rel-line" x1="130" y1="322" x2="130" y2="400" marker-start="url(#one)" marker-end="url(#many)"/>
  <text class="rel-label" x="145" y="363" text-anchor="start">1 : *</text>
  <text class="delete-rule" x="145" y="376" text-anchor="start">cascade</text>

  <!-- Workout 1──* Exercise -->
  <line class="rel-line" x1="240" y1="472" x2="370" y2="472" marker-start="url(#one)" marker-end="url(#many)"/>
  <text class="rel-label" x="305" y="465" text-anchor="middle">1 : *</text>
  <text class="delete-rule" x="305" y="486" text-anchor="middle">cascade</text>

  <!-- ExerciseDefinition 1──* Exercise -->
  <line class="rel-line" x1="480" y1="142" x2="480" y2="400" marker-start="url(#one)" marker-end="url(#many)"/>
  <text class="rel-label" x="495" y="270" text-anchor="start">1 : *</text>
  <text class="delete-rule" x="495" y="283" text-anchor="start">nullify</text>

  <!-- Exercise 1──* WorkoutSet -->
  <line class="rel-line" x1="590" y1="472" x2="720" y2="472" marker-start="url(#one)" marker-end="url(#many)"/>
  <text class="rel-label" x="655" y="465" text-anchor="middle">1 : *</text>
  <text class="delete-rule" x="655" y="486" text-anchor="middle">cascade</text>

  <!-- ==================== COMPUTED VALUES LEGEND ==================== -->
  <g transform="translate(700,20)">
    <rect x="0" y="0" width="240" height="170" rx="6" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
    <text x="120" y="22" text-anchor="middle" font-weight="bold" font-size="12" fill="#333">Computed (not stored)</text>
    <line x1="10" y1="30" x2="230" y2="30" stroke="#ddd"/>
    <text class="computed" x="12" y="50">WorkoutSet.volume</text>
    <text class="computed" x="12" y="68">  = weight x reps</text>
    <text class="computed" x="12" y="90">Exercise.totalVolume</text>
    <text class="computed" x="12" y="108">  = sum(sets.volume)</text>
    <text class="computed" x="12" y="130">Workout.totalVolume</text>
    <text class="computed" x="12" y="148">  = sum(exercises.totalVolume)</text>
  </g>
</svg>
